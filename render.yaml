services:
  - type: web
    name: landscaping-index
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: data
      mountPath: /opt/render/project/src
      sizeGB: 1
